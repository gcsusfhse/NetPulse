# NetPulse Configuration File
# Modify these settings to customize tool behavior

[SCAN]
# Default timeout for ping (seconds)
ping_timeout = 1

# Default timeout for port scan (seconds)
port_timeout = 0.5

# Max concurrent threads for port scanning
max_threads = 50

# Default output directory for CSV files
output_dir = outputs

# Default report directory
report_dir = reports

[NETWORK]
# Default subnet mask if auto-detection is used
default_mask = 24

[PORTS]
# Comma-separated list of ports to scan by default
# Leave empty to use built-in COMMON_PORTS list
custom_ports =

[DISPLAY]
# Enable ANSI colors in terminal output (true/false)
use_colors = true

# Show progress bar during scan (true/false)
show_progress = true
